controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    mecanum_controller:
      type: mecanum_drive_controller/MecanumDriveController


mecanum_controller:
  ros__parameters:

    front_left_wheel_command_joint: front_left_wheel_joint
    front_right_wheel_command_joint: front_right_wheel_joint
    rear_left_wheel_command_joint: rear_left_wheel_joint
    rear_right_wheel_command_joint: rear_right_wheel_joint

    wheel_radius: 0.05

    wheel_separation_x: 0.30
    wheel_separation_y: 0.34

    base_frame_id: base_link
    odom_frame_id: odom

    publish_rate: 50.0
    use_stamped_vel: false
    enable_odom_tf: true